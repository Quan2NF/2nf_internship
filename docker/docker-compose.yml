services:
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: pms_nginx
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - app
    restart: always

  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: pms_app
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - db
    restart: always
    command: php-fpm
  
  db:
    image: mysql:8.0
    container_name: pms_db
    restart: always
    environment:
      MYSQL_DATABASE: pms
      MYSQL_USER: pms_user
      MYSQL_PASSWORD: 30082004
      MYSQL_ROOT_PASSWORD: 30082004
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pms_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 30082004
    depends_on:
      - db

volumes:
  mysql_data:
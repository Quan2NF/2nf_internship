version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Docker/php/Dockerfile
    container_name: pm_app
    volumes:
      - ./pm_backend:/var/www/html
    depends_on:
      - db
    networks:
      - pm_network

  db:
    image: mysql:8.0
    container_name: pm_db
    restart: always
    environment:
      MYSQL_DATABASE: project_management
      MYSQL_USER: duc
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pm_network

  nginx:
    image: nginx:alpine
    container_name: pm_nginx
    ports:
      - "8000:80"
    volumes:
      - ./pm_backend:/var/www/html
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pm_network

volumes:
  db_data:

networks:
  pm_network:

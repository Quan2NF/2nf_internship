services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pms_app
    volumes:
      - ./backend:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - "8000:8000"
    command: >
      sh -c "
      if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist;
      fi &&
      php artisan serve --host=0.0.0.0 --port=8000
      "
    depends_on:
      - db
  
  db:
    image: mysql:8.0
    container_name: pms_db
    restart: always
    environment:
      MYSQL_DATABASE: pms
      MYSQL_USER: pms_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pms_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

  frontend:
    image: node:22.22.0-alpine3.23
    container_name: pms_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi && npm run dev -- --host"

volumes:
  mysql_data:
  vendor_data: